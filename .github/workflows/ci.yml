name: CI

# Verify Claudicator compiles on every pull request and every push to master.
# This build is unsigned (CODE_SIGNING_ALLOWED=NO) so it needs no secrets — it
# only proves the code builds, which is what protects against broken contributions.
# Signed/notarized release builds are handled separately (see release.yml).

on:
  push:
    branches: [master]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".github/ISSUE_TEMPLATE/**"
  pull_request:
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".github/ISSUE_TEMPLATE/**"
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (Release, unsigned)
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Pick the newest Xcode installed on the runner rather than a hard-coded
      # path — the available versions change as GitHub updates the image, so a
      # pinned "/Applications/Xcode_16.app" can vanish and fail the job.
      - name: Select latest Xcode
        run: |
          set -euo pipefail
          latest="$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)"
          if [ -z "$latest" ]; then latest="/Applications/Xcode.app"; fi
          echo "Using $latest"
          sudo xcode-select -switch "$latest/Contents/Developer"

      - name: Show versions
        run: |
          xcodebuild -version
          swift --version

      # Build OUTSIDE the repo root. The .xcodeproj uses a synchronized root
      # group, so DerivedData left inside the tree gets swept into the target and
      # breaks the build ("Multiple commands produce GeneratedAssetSymbols…").
      # Mirrors the same precaution in build-dmg.sh.
      - name: Build
        run: |
          set -euo pipefail
          xcodebuild \
            -project Claudicator.xcodeproj \
            -scheme Claudicator \
            -configuration Release \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            clean build

      # Once a test target exists, swap the step above for `clean build test`
      # (or add a separate test job). There are no tests yet.
