name: Feature request
description: Suggest an idea or improvement for Claudicator.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea! Claudicator is intentionally small and
        privacy-respecting, so the best suggestions fit that spirit — keep it
        lightweight, keep everything on the user's Mac.
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: What are you trying to do, and where does the app fall short today?
      placeholder: I'd like a heads-up before I hit my weekly limit, not just the session one…
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: What would you like to see?
      description: Describe the feature or change. Sketches and mockups welcome.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      validations:
        required: false
  - type: checkboxes
    id: principles
    attributes:
      label: Fit check
      description: Claudicator declines features that break these. Just a sanity check.
      options:
        - label: This doesn't require analytics, telemetry, or sending data off the user's Mac.
        - label: This keeps the app lightweight (no heavy new dependencies).
